<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/lumixo.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/lumixo-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b141a" />
  <meta name="description" content="Lumixo — real-time messaging, reimagined. Free for everyone, with Lumixo+ premium." />
  <meta name="author" content="LAKSHMESHWAR PANDEY" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="Lumixo" />
  <meta property="og:description" content="Real-time messaging, reimagined. Developed by LAKSHMESHWAR PANDEY." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/lumixo-512.png" />
  <title>Lumixo</title>
  <!-- Instant first paint: WhatsApp-class shell before JS executes. Removed when React mounts. -->
  <style>
    html, body, #root {
      height: 100%;
      height: 100dvh;
      min-height: 100%;
      min-height: 100dvh;
      margin: 0;
      width: 100%;
    }
    #root { display: flex; flex-direction: column; background: #0b141a; }
    body {
      margin: 0;
      background: #0b141a;
      color: #e9edef;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #fh-boot {
      position: fixed; inset: 0; z-index: 0;
      display: flex; height: 100%;
      background: #111b21;
      pointer-events: none;
    }
    html.fh-ready #fh-boot { display: none !important; }
    #fh-boot .boot-side {
      width: min(360px, 100%);
      border-right: 1px solid #2a3942;
      background: #111b21;
      display: flex; flex-direction: column;
    }
    #fh-boot .boot-head {
      height: 60px; background: #202c33;
      border-bottom: 1px solid #2a3942;
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
    }
    #fh-boot .boot-brand {
      font-weight: 700; font-size: 18px; color: #00a884; letter-spacing: -0.02em;
    }
    #fh-boot .boot-main {
      flex: 1; background: #0b141a;
      display: flex; align-items: center; justify-content: center;
    }
    #fh-boot .boot-main-inner { text-align: center; color: #8696a0; font-size: 14px; }
    #fh-boot .boot-logo {
      font-size: 40px; line-height: 1; margin-bottom: 12px;
      animation: fh-boot-pop 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    #fh-boot .skel {
      height: 14px; border-radius: 8px;
      background: linear-gradient(90deg, #1f2c33 25%, #2a3942 50%, #1f2c33 75%);
      background-size: 200% 100%;
      animation: fh-shimmer 1.2s ease-in-out infinite;
    }
    #fh-boot .boot-row {
      display: flex; gap: 12px; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid rgba(42,57,66,0.5);
    }
    #fh-boot .boot-av {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      background: #202c33;
    }
    #fh-boot .boot-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    @keyframes fh-shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    @keyframes fh-boot-pop {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @media (max-width: 720px) {
      #fh-boot .boot-main { display: none; }
      #fh-boot .boot-side { width: 100%; border-right: none; }
    }
  </style>
</head>
<body>
  <!-- Static shell: paints in <50ms. React replaces #root; shell hides on .fh-ready -->
  <div id="fh-boot" aria-hidden="true">
    <div class="boot-side">
      <div class="boot-head">
        <span class="boot-brand">Lumixo</span>
      </div>
      <div class="boot-row"><div class="boot-av"></div><div class="boot-lines"><div class="skel" style="width:55%"></div><div class="skel" style="width:80%;height:10px"></div></div></div>
      <div class="boot-row"><div class="boot-av"></div><div class="boot-lines"><div class="skel" style="width:40%"></div><div class="skel" style="width:70%;height:10px"></div></div></div>
      <div class="boot-row"><div class="boot-av"></div><div class="boot-lines"><div class="skel" style="width:62%"></div><div class="skel" style="width:50%;height:10px"></div></div></div>
      <div class="boot-row"><div class="boot-av"></div><div class="boot-lines"><div class="skel" style="width:48%"></div><div class="skel" style="width:75%;height:10px"></div></div></div>
      <div class="boot-row"><div class="boot-av"></div><div class="boot-lines"><div class="skel" style="width:58%"></div><div class="skel" style="width:45%;height:10px"></div></div></div>
      <div class="boot-row"><div class="boot-av"></div><div class="boot-lines"><div class="skel" style="width:35%"></div><div class="skel" style="width:65%;height:10px"></div></div></div>
    </div>
    <div class="boot-main">
      <div class="boot-main-inner">
        <div class="boot-logo">🎩</div>
        <div>Loading chats…</div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
