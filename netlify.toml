# Netlify deployment configuration for Lumixo web app

[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serve the App Link / Universal Link association files as JSON. These are real
# files in the publish dir so Netlify returns them directly (static files are
# matched before the SPA catch-all below), but we force the content-type so
# Android/iOS verification accepts them.
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Security headers (applied to every route) ────────────────────────────────
# CSP is scoped to the origins the app actually talks to: Supabase REST/Storage
# (https) + Realtime (wss), Razorpay checkout, and data:/blob: for inline
# stickers/app-icons and recorded voice notes. frame-ancestors 'none' replaces
# X-Frame-Options for clickjacking defence. Verify in the browser console after
# the next deploy and widen a source only if a legitimate request is blocked.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; media-src 'self' blob: https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://checkout.razorpay.com https://api.razorpay.com; frame-src https://*.razorpay.com https://checkout.razorpay.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(), payment=(self), display-capture=(self), usb=(), magnetometer=(), accelerometer=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    X-XSS-Protection = "0"
